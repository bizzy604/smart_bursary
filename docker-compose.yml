services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-bursary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smart_bursary
      POSTGRES_PASSWORD: smart_bursary
      POSTGRES_DB: smart_bursary_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_bursary -d smart_bursary_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smart-bursary-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
